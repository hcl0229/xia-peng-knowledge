# 夏鹏知识库 — 自动回归测试与打包
name: xia-peng CI

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/**'
      - 'references/**'
      - 'SKILL.md'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main, master]
    paths:
      - 'scripts/**'
      - 'references/**'
      - 'SKILL.md'
      - 'CHANGELOG.md'
  schedule:
    # 每日 UTC 00:00 自动运行 (北京时间 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  test:
    name: 🔬 回归测试 + 路由验证
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🧪 运行自动测试
        run: |
          python scripts/auto_test.py --p0-only
          echo "---"
          python scripts/auto_test.py
        continue-on-error: true  # 测试失败不阻断，报告中的判定决定是否通过

      - name: 🔍 路由表一致性验证
        run: |
          python scripts/router_v2.py validate

      - name: 📊 关键词缺口检测
        run: |
          python scripts/auto_test.py --gaps

  package:
    name: 📦 验证打包完整性
    runs-on: ubuntu-latest
    needs: test
    if: always()  # 即使测试有警告也运行打包验证
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 构建 .skill 包
        run: |
          python build_skill.py --clean

      - name: ✅ 验证 .skill 包内容
        run: |
          python build_skill.py --verify

      - name: 📤 上传 .skill 制品
        uses: actions/upload-artifact@v4
        with:
          name: xia-peng-knowledge-skill
          path: xia-peng-knowledge.skill
          retention-days: 7

  status:
    name: 🚦 健康检查报告
    runs-on: ubuntu-latest
    needs: [test, package]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📋 生成综合状态报告
        run: |
          echo "=== xia-peng-knowledge CI Status ==="
          echo "Test: ${{ needs.test.result }}"
          echo "Package: ${{ needs.package.result }}"
          echo ""
          python -c "
          import json, sys
          from pathlib import Path
          print('✅ CI 流水线执行完毕。')
          print('📊 请查看上方日志获取详细测试结果。')
          print('📦 制品: xia-peng-knowledge.skill (保留7天)')
          "
